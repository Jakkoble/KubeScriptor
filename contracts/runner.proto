syntax = "proto3";

package runner;
option csharp_namespace = "Commander";
option go_package = "github.com/Jakkoble/HexaTask/src/Runner/pb";

service RunnerService {
  rpc GetJobDetails (GetJobDetailsRequest) returns (GetJobDetailsResponse);
  rpc StreamLogs (stream LogMessage) returns (StreamLogsResponse);
}

message GetJobDetailsRequest {
  string job_id = 1;
}

message GetJobDetailsResponse {
  repeated string commands = 1;
}

message LogMessage {
  string job_id = 1;
  string log = 2;
  bool is_error = 3;
  bool is_final  = 4;
  int32 exit_code = 5;
}

message StreamLogsResponse {
  bool success = 1; 
}

