services:
  commander:
    build:
      context: .
      dockerfile: src/Commander/Dockerfile
    image: ghcr.io/jakkoble/hexatask-commander:latest
    container_name: hexatask-commander
    ports:
      - "5271:5271"
    environment:
      DOCKER_HOST: "unix:///var/run/docker.sock"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
