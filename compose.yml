services:
  commander:
    image: ghcr.io/jakkoble/hexatask-commander:latest
    container_name: hexatask-commander
    ports:
      - "5271:5271"
    environment:
      DOCKER_HOST: "unix:///var/run/docker.sock"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  tui:
    image: ghcr.io/jakkoble/hexatask-tui:latest
    depends_on:
      - commander
    environment:
      COMMANDER_ADDR: http://commander:5271
      JOB_DIR: /app/jobs
    stdin_open: true
    tty: true
    volumes:
      - ./jobs:/app/jobs
